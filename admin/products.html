<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory | Velvet &amp; Veil Admin</title>
    <meta name="description" content="Manage premium makeup inventory, add new beauty products, and configure color shade variants.">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="admin-layout">
        <!-- Admin Sidebar -->
        <aside class="admin-sidebar">
            <a href="./dashboard.html" class="admin-logo">
                VELVET <span>ADMIN</span>
            </a>
            <nav class="admin-nav">
                <a href="./dashboard.html" class="admin-nav-link">
                    <span>&#12480;</span>
                    <span>Dashboard Overview</span>
                </a>
                <a href="./orders.html" class="admin-nav-link">
                    <span>&#9993;</span>
                    <span>Order Management</span>
                </a>
                <a href="./products.html" class="admin-nav-link active">
                    <span>&#9733;</span>
                    <span>Product Inventory</span>
                </a>
                <a href="../index.html" class="admin-nav-link" style="margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.1); border-radius: 0; padding-top: 1.5rem;">
                    <span>&larr;</span>
                    <span>Live Storefront</span>
                </a>
            </nav>
        </aside>

        <!-- Admin Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <h1 class="admin-title">Product &amp; Shade Inventory</h1>
                <button class="btn-primary btn-add-product" style="padding: 0.8rem 2rem;">&plus; Add Premium Product</button>
            </header>

            <!-- Products Table -->
            <div class="admin-table-container">
                <div class="admin-table-header">
                    <h2 style="font-size: 1.3rem; color: var(--dark-cocoa);">Active Store Catalog</h2>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Product &amp; Category</th>
                            <th>Price (INR)</th>
                            <th>Shade Variants (Hex Architecture)</th>
                            <th>Stock Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody class="products-tbody">
                        <!-- Dynamically populated by admin.js -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Modal for Adding Product -->
    <div class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-title">Add Premium Product</h3>
                <button class="modal-close" style="background: transparent; font-size: 1.8rem; color: var(--dark-cocoa);">&times;</button>
            </div>
            <form class="product-form">
                <div style="display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem;">
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Product Name</label>
                        <input type="text" name="name" class="form-input" required placeholder="LUMINOUS_SILK_BLUSH">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Category Architecture</label>
                        <select name="category" class="form-input" style="background: white;" required aria-label="Category Architecture">
                            <option value="LIP ARTISTRY (LIP_LAB)">LIP ARTISTRY (LIP_LAB)</option>
                            <option value="FACE SCULPT & GLOW (FACE_ARCHITECT)">FACE SCULPT &amp; GLOW (FACE_ARCHITECT)</option>
                            <option value="EYE DEFINITION (EYE_MATRIX)">EYE DEFINITION (EYE_MATRIX)</option>
                        </select>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Price (INR)</label>
                        <input type="number" name="price" class="form-input" required placeholder="1499">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Shade Variants (Format: Name|HexCode, comma separated)</label>
                        <input type="text" name="shades" class="form-input" required placeholder="Rose Glow|#E5989B, Amber Dusk|#B5828C">
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <label style="font-size: 0.9rem; font-weight: 600;">Premium Description</label>
                        <textarea name="description" class="form-input" rows="4" required placeholder="A weightless, hyper-pigmented formula..."></textarea>
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 1.2rem; font-size: 1.1rem;">Save to Store Catalog</button>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../assets/js/store.js"></script>
    <script src="../assets/js/admin.js"></script>
</body>
</html>
